<style>
  .boleta-modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(15, 23, 42, 0.96);
    z-index: 9999;
    padding: 24px;
    overflow: auto;
  }

  .boleta-modal.visible {
    display: flex;
  }

  .boleta-modal-body {
    width: min(960px, 94vw);
    max-height: min(90vh, 840px);
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr auto;
    background: linear-gradient(180deg, #f8fafc, #e2e8f0);
    border-radius: 28px;
    box-shadow: 0 32px 90px rgba(15, 23, 42, 0.35);
    border: 1px solid rgba(15, 23, 42, 0.16);
  }

  .boleta-modal-header {
    padding: 24px;
    border-bottom: 1px solid rgba(15, 23, 42, 0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    background: #0f172a;
    color: #f8fafc;
    border-top-left-radius: 28px;
    border-top-right-radius: 28px;
  }

  .boleta-modal-title {
    margin: 0;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: 0.02em;
  }

  .boleta-modal-close {
    border: none;
    background: rgba(255, 255, 255, 0.08);
    color: #f8fafc;
    width: 42px;
    height: 42px;
    border-radius: 14px;
    cursor: pointer;
    font-size: 1.1rem;
    font-weight: 700;
  }

  .boleta-modal-content {
    padding: 20px 24px;
    overflow: auto;
    background: #ffffff;
    color: #0f172a;
    font-family: "Courier New", monospace;
    line-height: 1.5;
    white-space: pre-wrap;
    border-bottom: 1px solid rgba(15, 23, 42, 0.08);
    max-height: 62vh;
  }

  .boleta-modal-content pre {
    margin: 0;
    font-family: inherit;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .boleta-modal-actions {
    padding: 20px 24px 24px;
    display: flex;
    justify-content: flex-end;
    gap: 14px;
    background: #f8fafc;
    border-bottom-left-radius: 28px;
    border-bottom-right-radius: 28px;
  }

  .boleta-modal-button {
    border: none;
    border-radius: 14px;
    padding: 12px 22px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .boleta-modal-button:hover {
    transform: translateY(-1px);
  }

  .boleta-modal-button.primary {
    background: linear-gradient(180deg, #0f172a, #334155);
    color: #ffffff;
  }

  .boleta-modal-button.secondary {
    background: linear-gradient(180deg, #d1d5db, #9ca3af);
    color: #0f172a;
  }

  body.modal-open {
    overflow: hidden;
  }
</style>

<div class="boleta-modal" id="boleta-modal" aria-modal="true" role="dialog">
  <div class="boleta-modal-body">
    <div class="boleta-modal-header">
      <div>
        <p class="boleta-modal-title">Boleta de Compra</p>
        <p style="margin: 8px 0 0; font-size: 0.95rem; color: rgba(248,248,252,0.72);">
          Revise su boleta
        </p>
      </div>
      <button type="button" class="boleta-modal-close" data-action="cerrar-boleta">×</button>
    </div>
    <div class="boleta-modal-content"><pre id="boleta-modal-contenido">Cargando boleta...</pre></div>
    <div class="boleta-modal-actions">
      <button type="button" class="boleta-modal-button secondary" data-action="cerrar-boleta">Cerrar</button>
      <button type="button" class="boleta-modal-button primary" id="boleta-descargar">Descargar boleta</button>
    </div>
  </div>
</div>

<script>
  window.PopapBoleta = (function () {
    let apiBase = window.location.origin;
    let currentPath = null;

    function init(base) {
      if (base) {
        apiBase = base;
      }
      const modal = document.getElementById('boleta-modal');
      if (!modal) return;
      modal.addEventListener('click', (event) => {
        if (event.target === modal) {
          cerrar();
        }
      });
      modal.querySelectorAll('[data-action="cerrar-boleta"]').forEach((button) => {
        button.addEventListener('click', cerrar);
      });
      const descargarBtn = document.getElementById('boleta-descargar');
      if (descargarBtn) {
        descargarBtn.addEventListener('click', () => {
          if (currentPath) {
            descargarArchivo(currentPath);
          }
        });
      }
    }

    function descargarArchivo(path) {
      const enlace = document.createElement('a');
      enlace.href = `${apiBase}${path}`;
      enlace.download = path.split('/').pop();
      document.body.appendChild(enlace);
      enlace.click();
      document.body.removeChild(enlace);
    }

    async function mostrarBoletaPopup(path, options = {}) {
      const modal = document.getElementById('boleta-modal');
      const contenido = document.getElementById('boleta-modal-contenido');
      const descargarBtn = document.getElementById('boleta-descargar');
      const { autoDownload = false } = options;

      if (!modal || !contenido || !descargarBtn) {
        console.error('El modal de boleta no está disponible en el DOM.');
        return;
      }

      contenido.textContent = 'Cargando boleta...';
      currentPath = path;
      modal.classList.add('visible');
      document.body.classList.add('modal-open');

      try {
        const response = await fetch(`${apiBase}${path}`);
        if (!response.ok) {
          throw new Error('No se pudo cargar la boleta.');
        }
        const textoBoleta = await response.text();
        contenido.textContent = textoBoleta;
        if (autoDownload) {
          descargarArchivo(path);
        }
      } catch (error) {
        console.error(error);
        contenido.textContent = 'No se pudo cargar la boleta.';
        alert('No se pudo mostrar la boleta. Intenta descargarla directamente.');
      }
    }

    function cerrar() {
      const modal = document.getElementById('boleta-modal');
      if (modal) {
        modal.classList.remove('visible');
      }
      document.body.classList.remove('modal-open');
    }

    return {
      init,
      mostrarBoletaPopup,
      cerrar,
    };
  })();
</script>
